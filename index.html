        }

        }

        }

            transition: all 0.3s ease;

                author: "ダニエル・カーネマン / Daniel Kahneman",

            },

            },

                keywords: ["比較", "幸福", "他人", "相対", "comparison", "happiness", "others", "relative"]

            {

                author: "ダニエル・カーネマン / Daniel Kahneman",
                book: "『ファスト&スロー』/ Thinking, Fast and Slow",
                keywords: ["時間", "お金", "使い方", "幸福", "time", "money", "spending", "happiness"]
            },
            {
                source: 'kahneman',
                text_ja: "他人のための支出は、自分のための支出より幸福をもたらす。",
                text_en: "Spending on others brings more happiness than spending on yourself.",
                author: "ダニエル・カーネマン / Daniel Kahneman",
                book: "幸福度研究 / Happiness Research",
                keywords: ["贈与", "他人", "支出", "幸福", "giving", "others", "spending", "happiness"]
            },
            {
                source: 'kahneman',
                text_ja: "人は幸福になることに、あまり得意ではない。だから科学の助けが必要だ。",
                text_en: "People aren't very good at being happy. That's why we need science's help.",
                author: "ダニエル・カーネマン / Daniel Kahneman",
                book: "『ファスト&スロー』/ Thinking, Fast and Slow",
                keywords: ["科学", "学習", "智慧", "幸福", "science", "learning", "wisdom", "happiness"]
            },
        ];

        // ========================================
        // 状態管理
        // ========================================
        let currentLanguage = 'ja';
        let selectedConcern = 'relationships';
        let currentTime = 'morning';
        let selectedInsights = [];

        // ========================================
        // 締めくくりのメッセージ
        // ========================================
        const closingMessages = {
            relationships: {
                morning: {
                    ja: "人との繋がりは、幸福の源。今日も、大切な人を大切にしてね。",
                    en: "Connection with others is the source of happiness. Cherish those who matter today."
                },
                afternoon: {
                    ja: "良い関係は、時間をかけて育むもの。焦らず、少しずつで大丈夫。",
                    en: "Good relationships grow with time. No rush - little by little is fine."
                },
                evening: {
                    ja: "今日出会った人、話した人。それぞれが、あなたの人生を豊かにしているよ。",
                    en: "Everyone you met today enriches your life in their own way."
                }
            },
            career: {
                morning: {
                    ja: "仕事の意味は、あなたが決める。今日も、自分なりの意義を見出していこう。",
                    en: "You define the meaning of your work. Find your own purpose today."
                },
                afternoon: {
                    ja: "完璧じゃなくていい。今日できることを、できる範囲でやれば十分。",
                    en: "Perfection isn't needed. What you can do today is enough."
                },
                evening: {
                    ja: "仕事も大切、でもあなた自身も大切。バランスを忘れずに。お疲れさま。",
                    en: "Work matters, but so do you. Remember balance. Well done today."
                }
            },
            money: {
                morning: {
                    ja: "お金は手段。何のために使うか、何を大切にするかを考えよう。",
                    en: "Money is a tool. Think about what you use it for and what you value."
                },
                afternoon: {
                    ja: "経済的な不安、わかるよ。でも今できる小さな一歩から始めよう。",
                    en: "Financial worries are real. But start with small steps you can take now."
                },
                evening: {
                    ja: "お金では買えない豊かさも、あなたの周りにあるよ。今日はゆっくり休んで。",
                    en: "There's richness around you that money can't buy. Rest well tonight."
                }
            },
            health: {
                morning: {
                    ja: "健康は習慣の積み重ね。今日も、小さな一歩を大切に。",
                    en: "Health is built from small habits. Value each small step today."
                },
                afternoon: {
                    ja: "体の声に耳を傾けて。休みたい時は休む、それも大切なケアだよ。",
                    en: "Listen to your body. Resting when you need it is important care too."
                },
                evening: {
                    ja: "今日も体を動かせたこと、それだけで十分。ゆっくり休んでね。",
                    en: "Moving your body today was enough. Rest well now."
                }
            },
            purpose: {
                morning: {
                    ja: "人生の意味は、日々の小さな選択の中にある。今日も、自分らしく生きよう。",
                    en: "Life's meaning lies in small daily choices. Live true to yourself today."
                },
                afternoon: {
                    ja: "大きな目的を見つけようとしなくていい。今ここで大切なことに集中して。",
                    en: "You don't need to find grand purpose. Focus on what matters here and now."
                },
                evening: {
                    ja: "今日を生きたこと、それ自体が意味のあること。よく頑張ったね。",
                    en: "Living today itself has meaning. You did well."
                }
            },
            selfesteem: {
                morning: {
                    ja: "あなたはあなたのままで十分。今日も、自分を大切にしてね。",
                    en: "You are enough as you are. Be kind to yourself today."
                },
                afternoon: {
                    ja: "完璧じゃない自分を認めよう。それが自己受容の第一歩だよ。",
                    en: "Accept your imperfect self. That's the first step to self-acceptance."
                },
                evening: {
                    ja: "今日も頑張った自分を褒めてあげて。あなたは素晴らしいよ。",
                    en: "Praise yourself for today's efforts. You're wonderful."
                }
            },
            balance: {
                morning: {
                    ja: "バランスは完璧じゃなくていい。今日は、少しだけ自分の時間を作ってみて。",
                    en: "Balance doesn't need to be perfect. Make a little time for yourself today."
                },
                afternoon: {
                    ja: "仕事も大切、休息も大切。どちらも、あなたの人生の一部だよ。",
                    en: "Work matters, rest matters. Both are part of your life."
                },
                evening: {
                    ja: "今日も一日お疲れさま。明日のために、今夜はしっかり休んでね。",
                    en: "Well done today. Rest well tonight for tomorrow."
                }
            },
            future: {
                morning: {
                    ja: "未来は不確かだけど、今日できることに集中しよう。それが未来を作る。",
                    en: "The future is uncertain, but focus on what you can do today. That builds tomorrow."
                },
                afternoon: {
                    ja: "将来の不安、わかるよ。でも今この瞬間を大切にすることも忘れないで。",
                    en: "Future worries are real. But don't forget to value this present moment."
                },
                evening: {
                    ja: "明日のことは明日で大丈夫。今夜は、今日を生きたことに感謝して休もう。",
                    en: "Tomorrow can wait. Tonight, be grateful for today and rest."
                }
            }
        };

        // ========================================
        // DOM要素
        // ========================================
        const langJaBtn = document.getElementById('langJa');
        const langEnBtn = document.getElementById('langEn');
        const generateBtn = document.getElementById('generateBtn');
        const insightsGrid = document.getElementById('insightsGrid');

        // ========================================
        // 時間帯の自動判定
        // ========================================
        function detectTimeOfDay() {
            const hour = new Date().getHours();
            if (hour < 12) {
                currentTime = 'morning';
                return { time: 'morning', greeting_ja: 'おはようございます 🌅', greeting_en: 'Good morning 🌅' };
            } else if (hour < 18) {
                currentTime = 'afternoon';
                return { time: 'afternoon', greeting_ja: 'こんにちは ☀️', greeting_en: 'Good afternoon ☀️' };
            } else {
                currentTime = 'evening';
                return { time: 'evening', greeting_ja: 'こんばんは 🌙', greeting_en: 'Good evening 🌙' };
            }
        }

        // ========================================
        // 言語切り替え
        // ========================================
        langJaBtn.addEventListener('click', () => switchLanguage('ja'));
        langEnBtn.addEventListener('click', () => switchLanguage('en'));

        function switchLanguage(lang) {
            currentLanguage = lang;
            
            if (lang === 'ja') {
                langJaBtn.classList.add('bg-white', 'shadow-sm');
                langJaBtn.classList.remove('text-gray-600');
                langEnBtn.classList.remove('bg-white', 'shadow-sm');
                langEnBtn.classList.add('text-gray-600');
            } else {
                langEnBtn.classList.add('bg-white', 'shadow-sm');
                langEnBtn.classList.remove('text-gray-600');
                langJaBtn.classList.remove('bg-white', 'shadow-sm');
                langJaBtn.classList.add('text-gray-600');
            }
            
            updateUIText();
            
            // インサイトが既に表示されていたら再表示
            if (selectedInsights.length > 0) {
                displayInsights(selectedInsights);
                // 締めくくりメッセージも更新
                const message = closingMessages[selectedConcern][currentTime][currentLanguage];
                document.getElementById('closingText').textContent = message;
            }
        }

        function updateUIText() {
            const timeInfo = detectTimeOfDay();
            const texts = {
                ja: {
                    timeGreeting: timeInfo.greeting_ja,
                    labelConcern: '今、気になっていることは？',
                    concernRelationships: '人間関係',
                    concernCareer: '仕事・キャリア',
                    concernMoney: 'お金・経済的不安',
                    concernHealth: '健康・生活習慣',
                    concernPurpose: '人生の意味・目的',
                    concernSelfesteem: '自己肯定感',
                    concernBalance: 'ワークライフバランス',
                    concernFuture: '将来への不安',
                    btnText: '8つのヒントを受け取る ✨',
                    infoText: '幸福度研究の第一人者たちから、それぞれ1つずつヒントが届きます。<br>気になったヒントをタップすると詳しく表示されます。'
                },
                en: {
                    timeGreeting: timeInfo.greeting_en,
                    labelConcern: 'What concerns you now?',
                    concernRelationships: 'Relationships',
                    concernCareer: 'Work & Career',
                    concernMoney: 'Money & Finance',
                    concernHealth: 'Health & Lifestyle',
                    concernPurpose: 'Life Purpose',
                    concernSelfesteem: 'Self-esteem',
                    concernBalance: 'Work-Life Balance',
                    concernFuture: 'Future Anxiety',
                    btnText: 'Receive 8 Insights ✨',
                    infoText: 'You will receive one insight from each of the leading happiness researchers.<br>Tap any insight to see it in detail.'
                }
            };
            
            const t = texts[currentLanguage];
            document.getElementById('timeGreeting').textContent = t.timeGreeting;
            document.getElementById('labelConcern').textContent = t.labelConcern;
            document.getElementById('concernRelationships').textContent = t.concernRelationships;
            document.getElementById('concernCareer').textContent = t.concernCareer;
            document.getElementById('concernMoney').textContent = t.concernMoney;
            document.getElementById('concernHealth').textContent = t.concernHealth;
            document.getElementById('concernPurpose').textContent = t.concernPurpose;
            document.getElementById('concernSelfesteem').textContent = t.concernSelfesteem;
            document.getElementById('concernBalance').textContent = t.concernBalance;
            document.getElementById('concernFuture').textContent = t.concernFuture;
            document.getElementById('btnText').textContent = t.btnText;
            document.getElementById('infoText').innerHTML = t.infoText;
        }

        // ========================================
        // 悩み選択
        // ========================================
        document.querySelectorAll('.concern-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.concern-btn').forEach(b => {
                    b.classList.remove('border-pink-300', 'bg-pink-50', 'text-pink-700');
                    b.classList.add('border-gray-300', 'bg-white', 'text-gray-700');
                });
                this.classList.remove('border-gray-300', 'bg-white', 'text-gray-700');
                this.classList.add('border-pink-300', 'bg-pink-50', 'text-pink-700');
                selectedConcern = this.dataset.concern;
            });
        });

        // ========================================
        // 悩みに対応するキーワード
        // ========================================
        const concernKeywords = {
            relationships: ['人間関係', 'relationships', '繋がり', 'connection', '友人', 'friends'],
            career: ['仕事', 'work', 'キャリア', 'career', '充実', 'fulfillment', '没頭', 'flow'],
            money: ['お金', 'money', '経済', 'financial', '安全', 'security'],
            health: ['健康', 'health', '習慣', 'habits', 'ストレス', 'stress'],
            purpose: ['意味', 'meaning', '目的', 'purpose', '幸福', 'happiness'],
            selfesteem: ['自己', 'self', '承認', 'approval', '勇気', 'courage', '成長', 'growth'],
            balance: ['バランス', 'balance', '今', 'present', '瞑想', 'mindfulness'],
            future: ['将来', 'future', '不安', 'anxiety', '希望', 'hope', '楽観', 'optimism']
        };

        // ========================================
        // RAG: 各研究者から1つずつインサイトを選択
        // ========================================
        function selectInsightsFromAllSources() {
            const sources = ['seligman', 'csikszentmihalyi', 'lyubomirsky', 'rubin', 'adler', 'kabatzinn', 'waldinger', 'kahneman'];
            const selectedKeywords = concernKeywords[selectedConcern] || [];
            const insights = [];

            sources.forEach(source => {
                const candidatesForSource = happinessDatabase.filter(i => i.source === source);
                
                // キーワードマッチング
                const scored = candidatesForSource.map(insight => {
                    let score = 0;
                    insight.keywords.forEach(keyword => {
                        selectedKeywords.forEach(concernKeyword => {
                            if (keyword.toLowerCase() === concernKeyword.toLowerCase()) {
                                score += 1;
                            }
                        });
                    });
                    return { insight, score };
                });
                
                scored.sort((a, b) => b.score - a.score);
                
                // スコアが高いものから選択、なければランダム
                if (scored[0].score > 0) {
                    insights.push(scored[0].insight);
                } else {
                    insights.push(candidatesForSource[Math.floor(Math.random() * candidatesForSource.length)]);
                }
            });

            return insights;
        }

        // ========================================
        // インサイトカードの表示
        // ========================================
        function displayInsights(insights) {
            const shareText = currentLanguage === 'ja' ? 'シェアする' : 'Share';

            insightsGrid.innerHTML = insights.map((insight, index) => `
                <div class="insight-card card rounded-xl p-6 border-2 border-gray-200" data-index="${index}">
                    <div class="text-xs font-semibold text-pink-600 mb-2">
                        ${insight.author}
                    </div>
                    <div class="insight-text text-lg leading-relaxed mb-3 text-gray-800">
                        ${currentLanguage === 'ja' ? insight.text_ja : insight.text_en}
                    </div>
                    <div class="text-xs text-gray-500 mb-4">
                        ${insight.book}
                    </div>
                    <button class="share-btn w-full bg-gradient-to-r from-green-500 to-teal-500 text-white py-2 rounded-lg text-sm font-semibold shadow-lg hover:shadow-xl transition" onclick="shareInsight(${index})">
                        💫 ${shareText}
                    </button>
                </div>
            `).join('');

            insightsGrid.classList.remove('hidden');

            // カードクリックイベント
            document.querySelectorAll('.insight-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    // シェアボタンのクリックは除外
                    if (e.target.closest('.share-btn')) return;
                    
                    // 既に展開されているカードをクリックしたら閉じる
                    if (this.classList.contains('expanded')) {
                        this.classList.remove('expanded');
                    } else {
                        // 他のカードを閉じる
                        document.querySelectorAll('.insight-card').forEach(c => c.classList.remove('expanded'));
                        // このカードを展開
                        this.classList.add('expanded');
                    }
                });
            });
        }

        // ========================================
        // シェア機能
        // ========================================
        window.shareInsight = function(index) {
            const insight = selectedInsights[index];
            const insightText = currentLanguage === 'ja' ? insight.text_ja : insight.text_en;
            const shareText = `💡 ${insightText}\n\n- ${insight.author}\n${insight.book}\n\n#HappinessInsights`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Happiness Insights',
                    text: shareText
                });
            } else {
                navigator.clipboard.writeText(shareText).then(() => {
                    alert(currentLanguage === 'ja' ? 'コピーしました！' : 'Copied!');
                });
            }
        };

        // ========================================
        // メイン処理
        // ========================================
        generateBtn.addEventListener('click', () => {
            generateBtn.disabled = true;
            const originalText = document.getElementById('btnText').textContent;
            document.getElementById('btnText').innerHTML = '<span class="loading"></span> ' + 
                (currentLanguage === 'ja' ? '選んでいるよ...' : 'Selecting...');
            
            setTimeout(() => {
                selectedInsights = selectInsightsFromAllSources();
                displayInsights(selectedInsights);
                
                // 締めくくりメッセージを表示
                const message = closingMessages[selectedConcern][currentTime][currentLanguage];
                document.getElementById('closingText').textContent = message;
                document.getElementById('closingMessage').classList.remove('hidden');
                
                insightsGrid.scrollIntoView({ behavior: 'smooth', block: 'start' });
                
                generateBtn.disabled = false;
                document.getElementById('btnText').textContent = originalText;
            }, 500);
        });

        // ========================================
        // 初期化
        // ========================================
        updateUIText();
    </script>
